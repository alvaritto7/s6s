<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist — s6s</title>
    <link rel="icon" type="image/png" href="{{ASSET_FAVICON}}">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/componentes.css">
    <link rel="stylesheet" href="css/cabecera-nav.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/peticiones-wishlist.css">
    <link rel="stylesheet" href="css/librerias-externas.css">
    <link rel="stylesheet" href="css/otros.css">
</head>
<body class="pagina-dashboard" data-isotipo="{{ASSET_ISOTIPO}}">
    <header class="cabecera-dashboard">
        <div class="logo-cabecera">
            <a href="index.php?accion={{ACCION_DASHBOARD}}" class="logo-cabecera-enlace" title="Ir al inicio">
                <img src="{{ASSET_ISOTIPO}}" alt="s6s Inicio" class="logo-cabecera-isotipo">
            </a>
        </div>
        <button type="button" class="btn-menu-mobile" id="btn-menu-mobile" aria-expanded="false" aria-controls="nav-principal" aria-label="Abrir menú">Menú</button>
        <nav class="nav-dashboard" id="nav-principal">
            <ul class="nav-secciones-cabecera" aria-label="Navegación rápida">
                <li><a href="index.php?accion=inventario">Inventario</a></li>
                <li><a href="index.php?accion=peticiones">Peticiones</a></li>
                <li><a href="index.php?accion=wishlist" class="activo">Wishlist</a></li>
                {{ENLACE_MI_CUENTA}}{{ENLACE_ADMIN}}{{ENLACE_GESTION_USUARIOS}}
            </ul>
            <span class="usuario-sesion">
                <img src="{{ASSET_ISOTIPO}}" alt="" class="avatar-isotipo" aria-hidden="true">
                {{NOMBRE_USUARIO}} <em>({{ROL_USUARIO}})</em>
            </span>
            <form method="post" action="index.php" class="form-logout">
                <input type="hidden" name="accion" value="logout">
                <button type="submit" class="boton boton-secundario">Cerrar sesión</button>
            </form>
        </nav>
    </header>
    <main class="contenido-dashboard">
        <h1>Wishlist</h1>
        <p class="subtitulo-pagina">Propuestas de compra. Vota las que quieras priorizar (ranking por popularidad).</p>

        <section class="form-nueva-propuesta" aria-labelledby="titulo-nueva-propuesta">
            <h2 id="titulo-nueva-propuesta">Nueva propuesta</h2>
            <form id="form-nueva-propuesta">
                <label for="propuesta-titulo">Título (material que propones comprar)</label>
                <input type="text" id="propuesta-titulo" name="titulo" required maxlength="200" placeholder="Ej: Monitor 27 pulgadas">
                <label for="propuesta-descripcion">Descripción (opcional)</label>
                <textarea id="propuesta-descripcion" name="descripcion" rows="2" placeholder="Motivo o enlace de referencia"></textarea>
                <button type="submit" class="boton boton-primario">Crear propuesta</button>
            </form>
        </section>

        <div class="contenedor-propuestas" id="contenedor-propuestas" role="list">
            <p class="estado-carga" id="estado-carga-wishlist" aria-live="polite">
                <span class="spinner-isotipo-wrap" aria-hidden="true"><img src="{{ASSET_ISOTIPO}}" alt="" class="spinner-isotipo"></span>
                <span class="estado-carga-texto">Cargando propuestas…</span>
            </p>
        </div>
    </main>
    {{FOOTER}}
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/nav.js"></script>
    <script src="js/wishlist.js"></script>
</body>
</html>
