<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — s6s</title>
    <link rel="icon" type="image/png" href="{{ASSET_FAVICON}}">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="pagina-login">
    <main class="contenedor-login">
        <div class="logo-login" aria-hidden="true">
            <img src="{{ASSET_LOGOTIPO}}" alt="s6s Intelligent Supply System" class="logo-completo">
        </div>
        <form class="formulario-login" action="index.php" method="post" id="formulario-login" novalidate>
            <input type="hidden" name="accion" value="login">
            {{MENSAJE_ERROR}}
            {{MENSAJE_EXITO}}
            <label for="email">Email</label>
            <input type="email" id="email" name="email" autocomplete="email" required>
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>
            <button type="submit" class="boton boton-primario">Entrar</button>
        </form>
        <p class="enlace-login-registro"><a href="index.php?accion=registro">¿No tienes cuenta? Registrarse como empleado</a></p>
    </main>
    {{FOOTER}}
    <script src="js/login.js"></script>
</body>
</html>
